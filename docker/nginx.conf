server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Logs minimaux (Caddy/CF gèrent l'accès en amont)
    access_log off;
    server_tokens off;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml text/csv application/xml;

    # Page 404 -> retour accueil FR (SPA-like minimal, mais pages statiques réelles)
    error_page 404 /404.html;

    # Bloque les chemins sensibles
    location ~ /\.(?!well-known) { return 404; }

    # Opt-out Utiq : route interne -> redirection 302 vers le Consent Hub officiel.
    # Évite d'exposer consenthub.utiq.com en href dans le HTML (faux positif détecteurs).
    location = /opt-out {
        return 302 https://consenthub.utiq.com/;
    }

    # Sonde Docker interne.
    location = /_health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Une seule URL publique par page pour consolider tous les signaux SEO.
    location = /index.html {
        return 301 https://utiq-tracker.online/;
    }
    location ~ ^/(en|de|es|it|pl|da|pt|sv)/index\.html$ {
        return 301 https://utiq-tracker.online/$1/;
    }

    # Page confidentialité extension : URL canonique propre (sans .html)
    location = /privacy-extension.html {
        return 301 https://utiq-tracker.online/privacy-extension;
    }
    location ~ ^/(en|de|es|it|pl|da|pt|sv)/privacy-extension\.html$ {
        return 301 https://utiq-tracker.online/$1/privacy-extension;
    }
    location ~ ^/(faq|about|legal)$ {
        return 301 https://utiq-tracker.online/$1.html;
    }
    location ~ ^/(en|de|es|it|pl|da|pt|sv)/(faq|about|legal)$ {
        return 301 https://utiq-tracker.online/$1/$2.html;
    }
    location = /api/index.html {
        return 301 https://utiq-tracker.online/api/;
    }
    location ~ ^/(en|de|es|it|pl|da|pt|sv)/api/index\.html$ {
        return 301 https://utiq-tracker.online/$1/api/;
    }

    # Redirections des anciennes URLs (avant la bascule multilingue)
    location = /a-propos.html {
        return 301 https://utiq-tracker.online/about.html;
    }
    location = /mentions-legales.html {
        return 301 https://utiq-tracker.online/legal.html;
    }
    location = /en/legal-notice.html {
        return 301 https://utiq-tracker.online/en/legal.html;
    }

    # Pages d'accueil et documentation localisées, sans redirection de port interne.
    location = / {
        add_header Cache-Control "no-cache";
        try_files /index.html =404;
    }
    location ~ ^/(en|de|es|it|pl|da|pt|sv)/$ {
        add_header Cache-Control "no-cache";
        try_files /$1/index.html =404;
    }
    location ~ ^/(en|de|es|it|pl|da|pt|sv)/api/$ {
        add_header Cache-Control "no-cache";
        types { text/html html; }
        try_files /$1/api/index.html =404;
    }

    # Documentation HTML de l'API.
    location = /api/ {
        add_header Cache-Control "no-cache";
        types { text/html html; }
        try_files /api/index.html =404;
    }

    # Endpoint de signalement (POST) : proxy vers le backend Node sur le réseau edge.
    # Match exact -> prioritaire sur le préfixe ^~ /api/v1/ ci-dessous (lecture seule).
    # CORS + préflight OPTIONS sont gérés par le backend (pas de doublon ici).
    location = /api/v1/report {
        resolver 127.0.0.11 valid=30s;          # DNS Docker : ré-résout si le backend redémarre
        set $report_upstream http://utiq_tracker_report:8090;
        client_max_body_size 2k;                # garde-fou anti-bourrage en amont du backend
        proxy_pass $report_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;   # IP réelle transmise par Caddy
        proxy_read_timeout 5s;
        proxy_connect_timeout 2s;
    }

    # Endpoint JSON stable : lecture seule, CORS ouvert, préflight accepté.
    location ^~ /api/v1/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type" always;
        add_header Cache-Control "public, max-age=3600" always;
        types { application/json json; }
        if ($request_method = OPTIONS) { return 204; }
        try_files $uri =404;
    }
    location /data/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        types {
            application/json json;
            text/csv csv;
        }
        try_files $uri =404;
    }
    location /blocklists/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        types {
            text/html html;
            text/plain txt conf;
            text/markdown md;
        }
        try_files $uri $uri/ =404;
    }

    # Assets immuables (fingerprint absent -> cache court raisonnable)
    location /assets/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # HTML : revalidation systématique (assets versionnés ?v=hash gèrent leur cache)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ $uri.html =404;
    }
}
