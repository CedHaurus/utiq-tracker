name: utiq-tracker

services:
  web:
    image: nginx:1.30.2-alpine
    container_name: utiq_tracker_nginx
    restart: unless-stopped
    user: "101:101"
    read_only: true
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 128m
    cpus: 1.0
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=0755,size=32m
      - /var/run:uid=101,gid=101,mode=0755,size=1m
      - /tmp:uid=101,gid=101,mode=1777,size=16m,noexec,nosuid,nodev
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/_health | grep -qx ok"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - edge

  # Backend de signalement (POST /api/v1/report). Routé par le nginx ci-dessus.
  # Seul composant capable d'écrire : un unique volume inscriptible (./reports).
  report:
    build: ./report
    image: utiq-tracker-report:local
    container_name: utiq_tracker_report
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    env_file:
      - ./report/.env
    environment:
      - PORT=8090
      - REPORTS_DIR=/data
      - SITES_PATH=/app/public/api/v1/sites.json
    tmpfs:
      - /tmp:uid=1000,gid=1000,mode=1777,size=4m,noexec,nosuid,nodev
    volumes:
      - ./reports:/data                       # seul point d'écriture, hors racine web
      - ./public:/app/public:ro               # lecture de sites.json (domaines connus)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/healthz | grep -q ok"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - edge

networks:
  edge:
    name: edge
    external: true
