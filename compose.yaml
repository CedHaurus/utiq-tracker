name: utiq-tracker

services:
  web:
    image: nginx:1.30.2-alpine
    container_name: utiq_tracker_nginx
    restart: unless-stopped
    user: "101:101"
    read_only: true
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 128m
    cpus: 1.0
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=0755,size=32m
      - /var/run:uid=101,gid=101,mode=0755,size=1m
      - /tmp:uid=101,gid=101,mode=1777,size=16m,noexec,nosuid,nodev
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/_health | grep -qx ok"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - edge

networks:
  edge:
    name: edge
    external: true
