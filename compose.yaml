name: utiq-tracker

services:
  web:
    image: nginx:1.27-alpine
    container_name: utiq_tracker_nginx
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge

networks:
  edge:
    name: edge
    external: true
